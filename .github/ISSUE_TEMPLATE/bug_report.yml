name: Bug report
description: Report a problem with AethelOS
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. See [SUPPORT.md](https://github.com/zaeemalimohsin-ux/aethelos/blob/main/docs/SUPPORT.md) for what to include.
  - type: input
    id: version
    attributes:
      label: App version
      description: Identity tab — App version (e.g. 0.2.6.2 / wire 1)
      placeholder: "0.2.6.2 / wire 1"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Browser (Chrome)
        - Browser (Firefox)
        - Browser (Safari)
        - Browser (other)
        - Windows installer (.exe / .msi)
        - Self-hosted URL
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: What you did before the problem appeared
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened instead
    validations:
      required: true
  - type: checkboxes
    id: diagnostics
    attributes:
      label: Diagnostics
      options:
        - label: I can attach diagnostics JSON from Identity — Export diagnostics (optional)
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / logs
      description: Paste or drag screenshots into the comment after submitting
