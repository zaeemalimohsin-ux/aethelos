name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:eslint

      - name: Format check
        run: pnpm format:check

      - name: Version sync check
        run: node scripts/check-version-sync.mjs

      - name: Script encoding check
        run: node scripts/check-script-encoding.mjs

      - name: Unit tests
        run: pnpm test

      - name: User doc jargon check
        run: node scripts/check-user-docs.mjs

      - name: Sync mesh unit test
        run: pnpm --filter @aethelos/client test -- tests/sync-mesh.test.ts

      - name: Core coverage
        run: pnpm --filter @aethelos/core test:coverage

      - name: Build
        run: pnpm build

      - name: Scan client dist for test bridge
        run: node scripts/scan-no-test-bridge.mjs packages/client/dist

      - name: Scan client Docker image for test bridge
        run: |
          docker build -f packages/client/Dockerfile -t aethelos/client:scan .
          docker run --rm aethelos/client:scan sh -c "grep -r __aethelosTest /usr/share/nginx/html && exit 1 || exit 0"

  tauri-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Generate Tauri icons
        run: pnpm --filter @aethelos/client-tauri exec tauri icon ../client/public/favicon.svg

      - name: Build relay for sidecar check
        run: pnpm --filter @aethelos/relay build

      - name: Check desktop local-node prerequisites
        run: pnpm --filter @aethelos/client-tauri check:local-node

      - name: Bundle relay sidecar
        run: node scripts/bundle-relay-sidecar.mjs

      - name: Fetch Node sidecar
        run: node scripts/fetch-node-sidecar.mjs

      - name: Bundle static sidecar for Tauri
        run: node scripts/prepare-release-client.mjs

      - name: Fetch cloudflared sidecar
        run: node scripts/fetch-cloudflared.mjs --tauri

      - name: Cargo check (desktop shell)
        working-directory: packages/client-tauri/src-tauri
        run: cargo check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @aethelos/client exec playwright test --project=chromium

      - name: Pilot-off E2E
        run: pnpm test:e2e:pilot-off

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/client/playwright-report/
          retention-days: 7

  docker-founder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Start Docker stack
        run: |
          printf '%s\n' \
            'VITE_DEFAULT_RELAY_URL=' \
            'VITE_BOOTSTRAP_RELAYS=' \
            'VITE_INVITE_BASE_URL=' > .env.docker
          docker compose --env-file .env.docker up -d --build

      - name: Wait for client health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/healthz && exit 0
            sleep 2
          done
          echo "Client did not become healthy"
          docker compose logs
          exit 1

      - name: Publisher preflight (localhost)
        run: sh scripts/publisher-preflight.sh http://localhost:8080

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Mobile publish E2E (Docker founder + joiner)
        run: pnpm --filter @aethelos/client exec playwright test --project=founder-docker
        env:
          AETHELOS_DOCKER: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-founder-docker-report
          path: packages/client/playwright-report/
          retention-days: 7

  docker-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build combined image
        run: docker build -f Dockerfile -t aethelos/combined:test .

      - name: Run combined container
        run: docker run -d --name aethelos-combined -p 10000:10000 aethelos/combined:test

      - name: Wait for combined health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:10000/healthz && break
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Combined container did not become healthy"
              docker logs aethelos-combined
              exit 1
            fi
          done
          curl -sf http://localhost:10000/ | head -c 200 | grep -qi html
          docker exec aethelos-combined wget -qO- "http://127.0.0.1:8787/healthz"

      - name: WebSocket smoke on combined stack
        run: node scripts/publish-ws-smoke.mjs ws://localhost:10000/ws

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high
