name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:eslint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: User doc jargon check
        run: node scripts/check-user-docs.mjs

      - name: Core coverage
        run: pnpm --filter @aethelos/core test:coverage

      - name: Build
        run: pnpm build

  tauri-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Generate Tauri icons
        run: pnpm --filter @aethelos/client-tauri exec tauri icon ../client/public/favicon.svg

      - name: Build relay for sidecar check
        run: pnpm --filter @aethelos/relay build

      - name: Check desktop local-node prerequisites
        run: pnpm --filter @aethelos/client-tauri check:local-node

      - name: Bundle relay sidecar
        run: node scripts/bundle-relay-sidecar.mjs

      - name: Fetch Node sidecar placeholder
        run: node scripts/fetch-node-sidecar.mjs

      - name: Bundle static sidecar placeholder
        run: node scripts/bundle-static-sidecar.mjs

      - name: Fetch cloudflared sidecar placeholder
        run: node scripts/fetch-cloudflared.mjs --tauri

      - name: Cargo check (desktop shell)
        working-directory: packages/client-tauri/src-tauri
        run: cargo check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/client/playwright-report/

  docker-founder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @aethelos/core build

      - name: Start Docker stack
        run: |
          printf '%s\n' \
            'VITE_DEFAULT_RELAY_URL=' \
            'VITE_BOOTSTRAP_RELAYS=' \
            'VITE_INVITE_BASE_URL=' > .env.docker
          docker compose --env-file .env.docker up -d --build

      - name: Wait for client health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/healthz && exit 0
            sleep 2
          done
          echo "Client did not become healthy"
          docker compose logs
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Founder mobile E2E (Docker)
        run: pnpm --filter @aethelos/client exec playwright test --project=founder-docker
        env:
          AETHELOS_DOCKER: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-founder-docker-report
          path: packages/client/playwright-report/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level critical
