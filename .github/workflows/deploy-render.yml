name: Deploy to Render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - render.yaml
      - deploy/**
      - packages/client/**
      - packages/relay/**
      - packages/core/**

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK:-}" ]; then echo "::warning::RENDER_DEPLOY_HOOK not set"; exit 0; fi
          code=$(curl -sS -o /tmp/render-deploy.json -w "%{http_code}" -X POST "${RENDER_DEPLOY_HOOK}")
          echo "Render deploy hook HTTP ${code}"; cat /tmp/render-deploy.json || true
          test "${code}" -ge 200 -a "${code}" -lt 300
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Charter A preflight on Render URL
        env:
          AETHELOS_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "${AETHELOS_URL:-}" ]; then echo "skip (RENDER_APP_URL not set)"; exit 0; fi
          node scripts/charter-a-preflight.mjs
