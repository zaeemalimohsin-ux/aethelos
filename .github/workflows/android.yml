name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @aethelos/core build

      - name: Build Web Client
        run: pnpm --filter @aethelos/client build

      - name: Build Relay
        run: pnpm --filter @aethelos/relay build

      - name: Package Relay for Mobile
        run: |
          mkdir -p packages/client/dist/nodejs
          cp packages/relay/dist/index.js packages/client/dist/nodejs/index.js
          echo '{"name":"aethelos-relay","main":"index.js"}' > packages/client/dist/nodejs/package.json

      - name: Initialize and Add Capacitor Android
        run: |
          cd packages/client
          npx cap init "AethelOS" "org.aethelos.app" --web-dir dist
          npx cap add android

      - name: Build Android APK
        run: |
          cd packages/client/android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aethelos-android-apk
          path: packages/client/android/app/build/outputs/apk/debug/app-debug.apk
