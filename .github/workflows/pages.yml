name: Deploy website to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
      - "packages/client/public/logo.svg"
      - "packages/client/public/favicon.svg"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Assets
        run: |
          mkdir -p website_build
          cp -r website/* website_build/
          cp packages/client/public/logo.svg website_build/ || true
          cp packages/client/public/favicon.svg website_build/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "website_build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
