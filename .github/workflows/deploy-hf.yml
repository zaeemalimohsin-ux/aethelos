name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy current state to a temp directory to build a flat single-commit repo
          mkdir -p ../deploy_tmp
          cp -r ./* ../deploy_tmp/
          cd ../deploy_tmp
          
          # Strip the website folder containing binary images
          rm -rf website
          
          # Initialize fresh git with no binary history
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          git add -A
          git commit -m "deploy: aethelos browser release"
          git push --force https://TheGritz:$HF_TOKEN@huggingface.co/spaces/TheGritz/aethelos main
