name: Sync to Hugging Face Spaces

on:
  workflow_call:
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Hugging Face Space runtime
        run: |
          set -euo pipefail
          runtime=$(curl -sS "https://huggingface.co/api/spaces/TheGritz/aethelos/runtime")
          echo "Space runtime: ${runtime}"
          stage=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(r.stage||'');" "$runtime")
          err=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(r.errorMessage||'');" "$runtime")
          echo "stage=${stage} error=${err:-none}"

      - name: Wake Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Restarting Space (unpause / trigger rebuild)..."
          set +e
          code=$(curl -sS -o /tmp/hf-restart.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            "https://huggingface.co/api/spaces/TheGritz/aethelos/restart")
          curl_exit=$?
          set -e
          if [ "$curl_exit" -ne 0 ]; then
            echo "Warning: Space restart request failed (curl exit ${curl_exit}); continuing with git push"
          else
            echo "restart HTTP ${code}"
            cat /tmp/hf-restart.json || true
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "Warning: Space restart returned HTTP ${code}; continuing with git push"
            fi
          fi
          runtime=$(curl -sS "https://huggingface.co/api/spaces/TheGritz/aethelos/runtime")
          echo "Space runtime after restart: ${runtime}"
          stage=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(r.stage||'');" "$runtime")
          err=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(r.errorMessage||'');" "$runtime")
          if [ "$stage" = "PAUSED" ]; then
            echo "::warning::HF Space still PAUSED after restart (${err:-no detail}). Will attempt git push; operator may need to unpause in HF settings."
          fi

      - name: Push trimmed artifact to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ../deploy_tmp
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.cursor' \
            --exclude 'docs' \
            --exclude 'scripts' \
            --exclude 'website' \
            --exclude 'dist' \
            --exclude 'packages/.temp' \
            --exclude 'packages/client/android' \
            --exclude 'packages/client/e2e' \
            --exclude 'packages/client/tests' \
            --exclude 'packages/client/scratch' \
            --exclude 'packages/client/playwright-report' \
            --exclude 'packages/client/test-results' \
            --exclude 'packages/client/Dockerfile' \
            --exclude 'packages/core/tests' \
            --exclude 'packages/relay/tests' \
            --exclude 'packages/client-tauri' \
            --exclude 'packages/client-tauri/src-tauri/target' \
            --exclude 'coverage' \
            --exclude 'test-results' \
            --exclude 'docker-compose.yml' \
            --exclude 'render.yaml' \
            --exclude '*.bat' \
            --exclude '*.log' \
            --exclude 'release-build*.log' \
            --exclude 'cargo-release-quick.log' \
            . ../deploy_tmp/
          cd ../deploy_tmp

          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          git add -A
          git commit -m "deploy: aethelos browser release"
          git push --force "https://TheGritz:${HF_TOKEN}@huggingface.co/spaces/TheGritz/aethelos" main

      - name: Wait for Space health and run preflight
        env:
          AETHELOS_URL: https://thegritz-aethelos.hf.space
        run: |
          set -euo pipefail
          for i in $(seq 1 45); do
            if node scripts/charter-a-preflight.mjs; then
              echo "Space passed preflight after attempt $i"
              exit 0
            fi
            echo "Waiting for Space build... ($i/45)"
            sleep 20
          done
          echo "Space did not pass preflight within ~15 minutes"
          exit 1
