name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Remove website folder to prevent pushing binary files like og-image.png
          rm -rf website
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "cleanup: remove website folder before push" --allow-empty
          git push --force https://TheGritz:$HF_TOKEN@huggingface.co/spaces/TheGritz/aethelos HEAD:main
