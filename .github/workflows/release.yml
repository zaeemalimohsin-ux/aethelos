name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-e2e-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Sidecar checksum manifest
        run: node scripts/check-sidecar-checksums.mjs

      - name: Version sync check
        run: node scripts/check-version-sync.mjs

      - name: Tag version check
        run: node scripts/check-tag-version.mjs

      - name: Changelog check
        run: node scripts/check-changelog-release.mjs

      - name: Build core and run unit tests
        run: |
          pnpm --filter @aethelos/core build
          pnpm typecheck
          pnpm lint:eslint
          pnpm format:check
          node scripts/check-script-encoding.mjs
          node scripts/check-esbuild-singleton.mjs
          pnpm test
          node scripts/check-user-docs.mjs

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @aethelos/client exec playwright test --project=chromium

      - name: Federation-off E2E
        run: pnpm test:e2e:federation-off

      - name: Federation-on E2E
        run: pnpm test:e2e:federation-on

      - name: Build production client bundle
        run: pnpm --filter @aethelos/client build

      - name: Scan release bundle gates
        run: |
          node scripts/scan-no-test-bridge.mjs packages/client/dist
          node scripts/scan-federation-production.mjs packages/client/dist

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: packages/client/playwright-report/
          retention-days: 7

  release-desktop-gate:
    runs-on: windows-latest
    needs: release-e2e-gate
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Windows desktop product proof
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/proof-product.ps1 -SkipAndroid -SkipDevDesktop -SkipStaticGates

      - name: Free ports between proof and cold E2E
        if: success()
        shell: pwsh
        run: |
          Get-Process "node","cloudflared","aethelos-desktop" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          foreach ($port in @(5173, 5174, 5175, 8080, 8787, 9222)) {
            try {
              Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction Stop |
                ForEach-Object { Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue }
            } catch { }
          }
          Start-Sleep -Seconds 8

      - name: Desktop invite cold path E2E
        if: success()
        timeout-minutes: 25
        env:
          AETHELOS_DESKTOP_E2E: "1"
          AETHELOS_FRESH_E2E: "1"
        run: |
          pnpm --filter @aethelos/client exec playwright install chromium
          pnpm --filter @aethelos/client exec playwright test e2e/desktop-invite-cold.spec.ts --retries=1

  build-and-publish-windows:
    needs: [release-e2e-gate, release-desktop-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cargo lock check
        run: cargo check --locked --manifest-path packages/client-tauri/src-tauri/Cargo.toml

      - name: Build Windows desktop release
        run: node scripts/build-release.mjs

      - name: Verify shipping bundle has no test bridge
        run: node scripts/scan-no-test-bridge.mjs packages/client-tauri/src-tauri/resources/static

      - name: Sign Windows installer
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: node scripts/sign-windows-installer.mjs

      - name: Generate checksums
        shell: bash
        run: |
          cd dist/releases
          find . -mindepth 2 -type f -exec mv -t . {} +
          find . -type d -empty -delete
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/**/*
          generate_release_notes: true
          draft: false
          body: |
            ## AethelOS Release

            Download the installer below to run AethelOS locally on your Windows machine.

            ### Checksums (SHA-256)
            You can verify your download against the checksums provided in the assets.
