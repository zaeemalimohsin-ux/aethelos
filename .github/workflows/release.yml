name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version sync check
        run: node scripts/check-version-sync.mjs

      - name: Tag version check
        run: node scripts/check-tag-version.mjs

      - name: Changelog check
        run: node scripts/check-changelog-release.mjs

      - name: Build core and run tests
        run: |
          pnpm --filter @aethelos/core build
          pnpm typecheck
          pnpm lint:eslint
          node scripts/check-script-encoding.mjs
          pnpm test
          node scripts/check-user-docs.mjs

      - name: Build Windows desktop release
        run: node scripts/build-release.mjs

      - name: Generate checksums
        shell: bash
        run: |
          cd dist/releases
          find . -mindepth 2 -type f -exec mv -t . {} +
          find . -type d -empty -delete
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/**/*
          generate_release_notes: true
          draft: false
          body: |
            ## AethelOS Release

            Download the installer below to run AethelOS locally on your Windows machine.

            ### Checksums (SHA-256)
            You can verify your download against the checksums provided in the assets.
