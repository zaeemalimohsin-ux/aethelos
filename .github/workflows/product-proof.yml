name: product-proof

on:
  workflow_dispatch:
    inputs:
      include_android:
        description: Run full proof with Android emulator smoke (slow; bootstraps SDK)
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 0"

jobs:
  windows-product-proof:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core and relay
        run: |
          pnpm --filter @aethelos/core build
          pnpm --filter @aethelos/relay build

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Run product proof (skip Android)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/proof-product.ps1 -SkipAndroid

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-proof-playwright-report
          path: packages/client/playwright-report/

      - name: Upload share URL artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-proof-share-url
          path: .share-url
          if-no-files-found: ignore

  windows-android-proof:
    if: github.event_name == 'workflow_dispatch' && inputs.include_android == true
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core and relay
        run: |
          pnpm --filter @aethelos/core build
          pnpm --filter @aethelos/relay build

      - name: Install Playwright browsers
        run: pnpm --filter @aethelos/client exec playwright install --with-deps chromium

      - name: Bootstrap Android SDK and AVD
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/bootstrap-android-ci.ps1

      - name: Run full product proof with Android
        run: pnpm proof:product

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-proof-android-playwright-report
          path: packages/client/playwright-report/

      - name: Upload Android smoke screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-proof-android-smoke
          path: test-results/android-smoke*.png
          if-no-files-found: ignore
