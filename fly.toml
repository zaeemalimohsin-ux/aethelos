app = "aethelos"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "10000"
  RELAY_PORT = "8787"

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"